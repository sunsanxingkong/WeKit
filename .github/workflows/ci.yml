name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
      - 'docs/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '.editorconfig'
      - '.gitignore'
      - '.idea/**'
      - '**/*.js'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (
        !startsWith(github.event.head_commit.message, '[skip ci]') && 
        (github.ref == 'refs/heads/master' || github.event_name == 'pull_request')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: app/src/main/rust/wekit-native -> target

      - name: Cache Gradle build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt install -y gcc-multilib

      - name: Setup keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/wekit-keystore.jks
            echo "KEYSTORE_FILE=$RUNNER_TEMP/wekit-keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "SIGNED=true" >> $GITHUB_ENV
          else
            keytool -genkey -v -keystore $RUNNER_TEMP/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -noprompt
            echo "KEYSTORE_FILE=$RUNNER_TEMP/debug.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
            echo "SIGNED=false" >> $GITHUB_ENV
          fi

      - name: Build Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEKIT_KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          WEKIT_KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          WEKIT_KEY_ALIAS: ${{ env.KEY_ALIAS }}
          WEKIT_KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode all --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: wekit-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Mapping
        uses: actions/upload-artifact@v7
        with:
          name: wekit-mapping
          path: app/build/outputs/mapping/release/mapping.txt

  release-ci:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ success() && github.ref == 'refs/heads/master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: wekit-apk
          path: artifacts

      - name: Delete existing CI release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete CI --yes || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/CI || true

      - name: Generate update.json
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          GIT_HASH=$(git rev-parse --short HEAD)
          cat > artifacts/update.json <<EOU
          {
            "versionCode": ${COMMIT_COUNT},
            "versionName": "git+${GIT_HASH}",
            "commit": "${GIT_HASH}"
          }
          EOU

      - name: Create CI release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: CI
          name: CI
          body: |
            CI 自动构建
            提交: `${{ github.sha }}`
          files: |
            artifacts/*.apk
            artifacts/update.json
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# trigger debug fallback test
